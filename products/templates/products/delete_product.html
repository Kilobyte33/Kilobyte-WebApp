{% extends 'base.html' %}
{% block title %}Delete {{ product.name }} — Kilobyte{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border">
            <div class="card-body text-center py-5">
                <i class="bi bi-trash text-danger fs-1"></i>
                <h3 class="h4 mt-3">Delete Listing?</h3>
                <p class="text-muted">Are you sure you want to permanently delete <strong>"{{ product.name }}"</strong>?
                </p>

                <div class="d-flex gap-2 justify-content-center mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm px-4">Yes, Delete</button>
                    </form>
                    <a href="{% url 'product_detail' product.id %}"
                        class="btn btn-outline-secondary btn-sm px-4">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
