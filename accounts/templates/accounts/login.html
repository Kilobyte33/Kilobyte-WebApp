{% extends 'base.html' %}
{% block title %}Log In — Kilobyte{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-4 text-center">Log In</h2>
                <form method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                    <div class="alert alert-danger small">Invalid username or password.</div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Sign In</button>
                    </div>
                </form>
                <div class="mt-4 text-center small">
                    <span class="text-muted">Don't have an account?</span>
                    <a href="{% url 'signup' %}" class="text-decoration-none">Create Account</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
